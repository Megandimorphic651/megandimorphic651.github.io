{%- assign latest_limit = site.posts | default: 6 -%}
<aside class="page-sidebar">
	<div class="sidebar-block sidebar-latest-posts">
		<h3>Latest Posts</h3>
		{{ site.posts }}
		{%- if site.posts > 0 -%}

		<ul>
		{%- for post in site.posts | limit: latest_limit -%}
			<li><a href="{{ post.url }}">{{ post.title }}</a></li>
		{%- endfor -%}
		</ul>

		{%- else -%}
		<p>No posts found</p>
		{%- endif -%}
	</div>
</aside>

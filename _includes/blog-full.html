<li>
	<article id='{{ post.name | slugify | remove_last: "-md" }}' class="posts-entry">
		<header class="entry-header">
			<h2 class="post-title">
				<a href="{{ post.url | absolute_url }}">
					{{ post.title | strip_html }}
				</a>
			</h2>
			{%- if post.subtitle %}
			<p class="post-subtitle">
				{{ post.subtitle | strip_html }}
			</p>
			{%- endif -%}
		</header>
		<div>
			{{ post.content }}
		</div>
	</article>
</li>
